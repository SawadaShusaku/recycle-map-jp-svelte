name: Lint Check

on:
  push:
    branches: [main, sidebar-pages-redesign]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Check for negative z-index
        run: |
          if grep -r "z-\[-" src/; then
            echo "❌ エラー: 負のz-index (z-[-*]) が検出されました"
            echo "正の整数のみを使用してください (z-10, z-20 など)"
            exit 1
          fi
          echo "✅ z-indexチェック完了"
      - run: npm run check
